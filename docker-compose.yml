services:
  fundscope:
    build:
      context: .
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    restart: unless-stopped

# Docker Compose reads variable interpolation from .env (not .env.local).
# To make build args work, either:
#   1. Run: docker compose --env-file .env.local up --build
#   2. Or copy .env.local to .env
